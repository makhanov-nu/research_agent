# Postgres + pgvector for the research agent's memory.
#   docker compose up -d
# Then set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/research_agent
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_agent
    ports:
      # Bind to localhost only: the bot runs on the same host. Do not expose
      # Postgres on the public interface.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
