# Postgres + pgvector for the research agent's memory.
#   docker compose up -d
# Then set DATABASE_URL=postgresql://postgres:postgres@localhost:5432/research_agent
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_agent
    ports:
      # Bind to localhost only: the bot runs on the same host. Do not expose
      # Postgres on the public interface.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local, self-hosted trace UI (free). Agent/graph runs stream here when
  # PHOENIX_ENABLED=true. UI + OTLP collector on 6006; data persisted locally.
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "127.0.0.1:6006:6006"
    volumes:
      - phoenixdata:/mnt/data
    environment:
      PHOENIX_WORKING_DIR: /mnt/data

volumes:
  pgdata:
  phoenixdata:

